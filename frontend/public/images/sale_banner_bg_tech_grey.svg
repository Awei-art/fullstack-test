<svg width="1920" height="100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
        <!-- Gold Gradient (Replaced Tech Grey) -->
        <linearGradient id="tech_grey_grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#B6986C;stop-opacity:1" /> <!-- Darker Gold -->
            <stop offset="50%" style="stop-color:#C6A87C;stop-opacity:1" /> <!-- User Requested Color (Main) -->
            <stop offset="100%" style="stop-color:#A6885C;stop-opacity:1" /> <!-- Darker Gold -->
        </linearGradient>

        <!-- Grid Pattern -->
        <pattern id="grid_pattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
        </pattern>

        <!-- Tech Glow Filter -->
        <filter id="tech_glow" height="300%" width="300%" x="-75%" y="-75%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Center Mask (Optional, keeping consistent with previous logic just in case) -->
        <mask id="text_safe_zone">
            <rect width="100%" height="100%" fill="white" />
            <radialGradient id="fade_center">
                <stop offset="30%" stop-color="#444" /> <!-- Dim the pattern in center -->
                <stop offset="100%" stop-color="white" />
            </radialGradient>
            <rect width="100%" height="100%" fill="url(#fade_center)" fill-opacity="0.5" />
        </mask>
    </defs>

    <!-- Background Layer -->
    <rect width="100%" height="100%" fill="url(#tech_grey_grad)" />
    
    <!-- Grid Overlay -->
    <rect width="100%" height="100%" fill="url(#grid_pattern)" opacity="0.3" mask="url(#text_safe_zone)" />

    <!-- Tech Lines/Circuit Elements -->
    <g stroke="#ffffff" stroke-width="1" fill="none" class="tech_lines" filter="url(#tech_glow)" opacity="0.8">
        <!-- Horizontal Tech Lines -->
        <path d="M0,20 L400,20 L450,40 L800,40" />
        <path d="M1100,60 L1450,60 L1500,80 L1920,80" />
        
        <!-- Decorative Nodes -->
        <circle cx="400" cy="20" r="2" fill="#fff" stroke="none" />
        <circle cx="450" cy="40" r="2" fill="#fff" stroke="none" />
        <circle cx="1500" cy="80" r="2" fill="#fff" stroke="none" />

        <!-- Angled accents -->
        <path d="M100,100 L150,50" stroke-width="0.5" opacity="0.5" />
        <path d="M1800,0 L1750,50" stroke-width="0.5" opacity="0.5" />
    </g>

    <!-- Top/Bottom Borders -->
    <path d="M0,1 L1920,1" stroke="#ffffff" stroke-width="1" opacity="0.5" />
    <path d="M0,99 L1920,99" stroke="#ffffff" stroke-width="1" opacity="0.5" />
</svg>
