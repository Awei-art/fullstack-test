# ============================================
# Docker Compose - 田原葡萄 全端專案
# ============================================
# 使用方式:
#   啟動: docker compose up -d --build
#   停止: docker compose down
#   查看日誌: docker compose logs -f
#   重建: docker compose up -d --build --force-recreate
# ============================================

services:
  # ==========================================
  # MySQL 資料庫
  # ==========================================
  db:
    image: mysql:8.0
    container_name: grape_shop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-***REMOVED_DB_PASSWORD***}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-grape_shop}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306" # 使用 3307 避免與本機 MySQL 衝突
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-***REMOVED_DB_PASSWORD***}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grape_network

  # ==========================================
  # phpMyAdmin (資料庫管理介面)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: grape_shop_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-***REMOVED_DB_PASSWORD***}
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - grape_network

  # ==========================================
  # Django 後端 API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grape_shop_backend
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${MYSQL_DATABASE:-grape_shop}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      # 第三方登入
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL:-http://localhost:3000/login/line-callback}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3000/login/google-callback}
      # Email
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      # ECPay 金流
      - ECPAY_MERCHANT_ID=${ECPAY_MERCHANT_ID}
      - ECPAY_HASH_KEY=${ECPAY_HASH_KEY}
      - ECPAY_HASH_IV=${ECPAY_HASH_IV}
      - ECPAY_PAYMENT_URL=${ECPAY_PAYMENT_URL:-https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      # Cloudinary（選填）
      - CLOUD_NAME=${CLOUD_NAME:-}
      - API_KEY=${API_KEY:-}
      - API_SECRET=${API_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - grape_network

  # ==========================================
  # Nuxt 前端
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: grape_shop_frontend
    restart: unless-stopped
    environment:
      - NUXT_PUBLIC_API_BASE=http://backend:8000/api
      - WATCHPACK_POLLING=true
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - grape_network

# ==========================================
# 資料卷（持久化資料）
# ==========================================
volumes:
  mysql_data:
    driver: local
  backend_media:
    driver: local
  backend_static:
    driver: local

# ==========================================
# 網路
# ==========================================
networks:
  grape_network:
    driver: bridge
