# ============================================
# Docker Compose - 田園葡萄 全端專案
# ============================================
# 使用方式:
#   啟動: docker compose up -d --build
#   停止: docker compose down
#   查看日誌: docker compose logs -f
#   重建: docker compose up -d --build --force-recreate
# ============================================
# 資料庫已搬移至 Railway 雲端 MySQL
# ============================================

services:
  # ==========================================
  # Django 後端 API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grape_shop_backend
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_HOST=${MYSQL_HOST}
      - DB_PORT=${MYSQL_PORT}
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    networks:
      - grape_network

  # ==========================================
  # Nuxt 前端
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grape_shop_frontend
    restart: unless-stopped
    environment:
      - NUXT_PUBLIC_API_BASE=http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - grape_network

# ==========================================
# 資料卷（持久化資料）
# ==========================================
volumes:
  backend_media:
    driver: local
  backend_static:
    driver: local

# ==========================================
# 網路
# ==========================================
networks:
  grape_network:
    driver: bridge
