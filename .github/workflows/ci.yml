name: Tianyuan CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 任務 1：後端 Django 檢查
  # ==========================================
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Check Django Project
        run: |
          cd backend
          python manage.py check

  # ==========================================
  # 任務 2：前端 Nuxt 檢查
  # ==========================================
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm install
          
      - name: Build Nuxt Application
        run: |
          cd frontend
          npm run build

  # ==========================================
  # 任務 3：Docker Compose 整合打包測試
  # ==========================================
  docker-build-test:
    needs: [backend-check, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Container
        run: |
          docker compose build
